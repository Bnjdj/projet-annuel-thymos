<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="THYMOS — Le logiciel de gestion pour coachs MMA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C1121F"/>
      <stop offset="1" stop-color="#8f0d17"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#C1121F" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#C1121F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond sombre -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Filet décoratif or -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#B8960C" stroke-opacity="0.35" stroke-width="2" rx="18"/>

  <!-- Emblème : cercle + glyphe TM (cohérent avec le favicon) -->
  <g transform="translate(600 178)">
    <circle r="74" fill="#080808"/>
    <circle r="70" fill="none" stroke="#C1121F" stroke-width="3"/>
    <circle r="58" fill="none" stroke="#B8960C" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="58" fill="#C1121F" letter-spacing="-2">TM</text>
  </g>

  <!-- Wordmark THYMOS -->
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="120" letter-spacing="14" fill="url(#wordmark)">THYMOS</text>

  <!-- Baseline principale -->
  <text x="600" y="430" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="500" font-size="34" letter-spacing="2" fill="#F0EDE8">Le logiciel de gestion pour coachs MMA</text>

  <!-- Séparateur or -->
  <rect x="500" y="468" width="200" height="3" rx="1.5" fill="#B8960C" fill-opacity="0.7"/>

  <!-- Sous-baseline fonctionnalités -->
  <text x="600" y="520" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="26" letter-spacing="1" fill="#A0A0A0">Suivi physique &amp; mental &#183; Alertes &#183; Combats</text>

  <!-- URL -->
  <text x="600" y="572" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="22" letter-spacing="3" fill="#B8960C">thymos-mma.fr</text>
</svg>
