<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="THYMOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
  </defs>

  <!-- Fond sombre arrondi (zone sûre maskable : glyphe centré dans ~80%) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Double anneau (rouge marque + filet or), cohérent avec favicon-v2 -->
  <circle cx="256" cy="256" r="176" fill="#080808"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#C1121F" stroke-width="10"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#B8960C" stroke-opacity="0.45" stroke-width="4"/>

  <!-- Glyphe TM -->
  <text x="256" y="318" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="160" fill="#C1121F" letter-spacing="-6">TM</text>
</svg>
